*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{--bg:#FFF7ED;--bg2:#fff;--bg3:#F1F5F9;--text:#1E293B;--text2:#6B7280;--text3:#9CA3AF;--card:#fff;--border:#E2E8F0;--header:linear-gradient(135deg,#FDE1C4 0%,#FECDD3 50%,#DDD6FE 100%);--accent:#6366F1;--mainbg:linear-gradient(180deg,#FFF7ED 0%,#FFF1F2 50%,#F0F4FF 100%)}

.sr{display:flex;gap:6px;margin-top:14px}.sc{flex:1;background:rgba(255,255,255,.65);backdrop-filter:blur(8px);border-radius:14px;padding:8px 2px;text-align:center}.dark .sc{background:rgba(255,255,255,.08)}.se{font-size:18px}.sv{font-size:16px;font-weight:900}.sl{font-size:8px;color:var(--text2);font-weight:700;text-transform:uppercase;letter-spacing:.5px}
.cs{display:flex;gap:4px;padding:10px 20px 0;overflow-x:auto;-webkit-overflow-scrolling:touch}.cd{min-width:44px;padding:6px 4px;border-radius:12px;text-align:center;cursor:pointer;border:2px solid transparent;flex-shrink:0}.cd.a{background:var(--accent);border-color:var(--accent)}.cd.a .cn,.cd.a .cx{color:#fff}.cd.h{border-color:var(--accent)}.cn{font-size:9px;font-weight:700;color:var(--text3);text-transform:uppercase}.cx{font-size:15px;font-weight:800;color:var(--text)}.cl{font-size:8px;color:var(--text3);font-weight:600}
.nr{padding:6px 20px 0;display:flex;gap:6px;align-items:center}.nb{width:38px;height:38px;border-radius:12px;border:none;cursor:pointer;background:var(--bg3);font-size:16px;display:flex;align-items:center;justify-content:center;color:var(--text2)}.pl{padding:8px 14px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:700}
.ts{display:flex;margin:8px 20px 0;background:var(--bg3);border-radius:14px;padding:3px}.tb{flex:1;padding:10px 0;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:600;background:transparent;color:var(--text2);transition:.2s}.tb.a{background:var(--card);color:var(--accent);font-weight:800;box-shadow:0 2px 8px rgba(0,0,0,.06)}

.pn{position:fixed;bottom:0;left:0;right:0;z-index:100;background:var(--card);border-radius:28px 28px 0 0;box-shadow:0 -8px 48px rgba(0,0,0,.15);max-height:88vh;overflow-y:auto}.pi{padding:16px 20px 24px}.ph{width:40px;height:4px;background:var(--border);border-radius:2px;margin:0 auto 12px}.pp{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}.pt{font-size:18px;font-weight:900}.cb{background:var(--bg3);border:none;border-radius:12px;width:38px;height:38px;font-size:18px;cursor:pointer;color:var(--text2)}

.tx{border-radius:20px;padding:20px;text-align:center;margin-bottom:10px;border:2px solid rgba(232,99,74,.2)}.td{font-size:52px;font-weight:900;color:#E8634A;letter-spacing:2px}.tt{padding:14px 32px;border-radius:16px;border:none;cursor:pointer;color:#fff;font-size:16px;font-weight:800}.tr{padding:14px 18px;border-radius:16px;border:2px solid var(--border);background:var(--card);cursor:pointer;font-size:16px;font-weight:700;color:var(--text2)}
.ar{display:flex;gap:8px;margin-top:16px}.ab{flex:1;padding:14px;border-radius:16px;border:2px solid var(--border);background:var(--card);font-size:15px;font-weight:700;cursor:pointer;color:var(--text2)}.as{flex:2;padding:14px;border-radius:16px;border:none;color:#fff;font-size:15px;font-weight:900;cursor:pointer}

.em{text-align:center;padding:40px 20px;color:var(--text3)}.ei{font-size:52px;margin-bottom:10px}
.ss{background:var(--card);border-radius:20px;padding:16px;margin-bottom:12px;border:1px solid var(--border)}.st{font-size:14px;font-weight:900;color:var(--accent);margin-bottom:12px}.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px}.sx{border-radius:16px;padding:12px 14px}.sxl{font-size:11px;font-weight:800;text-transform:uppercase;letter-spacing:.5px}.sxv{font-size:22px;font-weight:900;margin-top:2px}
.dr{display:flex;gap:10px}.dc{flex:1;text-align:center;border-radius:16px;padding:14px 8px}.dn{font-size:32px;font-weight:900}.al{margin-top:10px;border-radius:12px;padding:8px 12px;font-size:12px;font-weight:700}
.clb{padding:8px 14px;border-radius:12px;border:none;cursor:pointer;font-size:13px;font-weight:700}
